name: Selenium E2E + Appium Dry-Run + Report + Deploy

on:
  push:
    branches: [ main ]

jobs:
  selenium:
    name: Selenium E2E Web + API Tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install root dependencies
        run: npm install --legacy-peer-deps

      - name: Install backend dependencies
        working-directory: backend
        run: npm install

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm install --legacy-peer-deps

      - name: Install selenium tests dependencies
        working-directory: selenium-tests
        run: npm install --legacy-peer-deps

      - name: Start backend server
        working-directory: backend
        run: nohup npm run dev > backend.log 2>&1 &
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}

      - name: Start frontend server
        working-directory: frontend
        run: nohup npm run dev > frontend.log 2>&1 &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000

      - name: Wait for services
        run: |
          sleep 10
          npx wait-on http://localhost:3000 http://localhost:4000 --timeout 120000

      - name: Run Selenium E2E tests
        working-directory: selenium-tests
        run: npm run test:generated
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000
          BROWSER: chrome
          HEADLESS: true
          TEST_EMAIL: demo@tradementor.com
          TEST_PASSWORD: User@123456

      - name: Upload Selenium results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: selenium-tests/test-results/

  appium:
    name: Appium Mobile Tests Dry-Run
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install Appium test dependencies
        run: python -m pip install --upgrade pip && python -m pip install -r appium-tests/requirements.txt

      - name: Run Appium dry-run
        run: |
          mkdir -p appium-tests/results
          python appium-tests/dry_run.py

      - name: Upload Appium results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: appium-results
          path: appium-tests/results/

  report:
    name: Generate LifeLink_Test_Report.xlsx
    needs: [selenium, appium]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download Selenium results
        uses: actions/download-artifact@v4
        with:
          name: selenium-results
          path: selenium-tests/test-results

      - name: Download Appium results
        uses: actions/download-artifact@v4
        with:
          name: appium-results
          path: appium-tests/results

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install report generator dependencies
        working-directory: selenium-mobile-tests
        run: npm install --legacy-peer-deps

      - name: Generate combined report
        working-directory: selenium-mobile-tests
        run: NODE_PATH=$(pwd)/node_modules node ../scripts/generate_combined_report.js

      - name: Upload combined report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: combined-report
          path: test-results/combined_test_report.xlsx

  deploy-pages:
    name: Deploy to GitHub Pages
    needs: report
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pages: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download combined report
        uses: actions/download-artifact@v4
        with:
          name: combined-report
          path: test-results

      - name: Prepare public folder
        run: |
          mkdir -p public
          cp test-results/combined_test_report.xlsx public/ || true

      - name: Configure git user for GH Pages
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

      - name: Deploy to GitHub Pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./public
