name: E2E Tests

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  selenium:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend deps
        working-directory: backend
        run: npm ci
      - name: Install frontend deps
        working-directory: frontend
        run: npm ci --legacy-peer-deps
      - name: Install selenium tests deps
        working-directory: selenium-tests
        run: npm ci --legacy-peer-deps
      - name: Start backend
        working-directory: backend
        run: nohup npm run dev > backend.log 2>&1 &
      - name: Start frontend
        working-directory: frontend
        run: nohup npm run dev > frontend.log 2>&1 &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:4000
      - name: Wait for services
        run: |
          sleep 10
          npx wait-on http://localhost:3000 http://localhost:4000 --timeout 120000
      - name: Run selenium generated tests
        working-directory: selenium-tests
        run: npm run test:generated
        env:
          BASE_URL: http://localhost:3000
          API_URL: http://localhost:4000
          BROWSER: chrome
          HEADLESS: true
          TEST_EMAIL: demo@tradementor.com
          TEST_PASSWORD: User@123456
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: selenium-results
          path: selenium-tests/test-results
