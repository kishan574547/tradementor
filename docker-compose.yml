version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: tradementor-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: tradementor
      POSTGRES_PASSWORD: tradementor_secret
      POSTGRES_DB: tradementor
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
