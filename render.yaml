services:
  - type: web
    name: tradementor-api
    runtime: node
    rootDir: backend
    buildCommand: npm install && npm run build
    startCommand: node dist/index.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: "4000"
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://tradementor.vercel.app

  - type: pserv
    name: tradementor-db
    plan: free
    ipAllowList: []
    postgresMajorVersion: 15
